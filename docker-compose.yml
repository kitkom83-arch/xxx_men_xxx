services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xmc
      POSTGRES_USER: xmc
      POSTGRES_PASSWORD: xmc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmc -d xmc"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://xmc:xmc_password@postgres:5432/xmc?schema=public
      SESSION_SECRET: docker-dev-session-secret-change-me
      ENCRYPTION_KEY: docker-dev-encryption-key-change-me
    ports:
      - "3000:3000"

volumes:
  postgres-data:
